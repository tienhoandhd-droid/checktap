name: Deploy dashboard len GitHub Pages

# Tu dong chay khi co thay doi tren nhanh chinh, hoac bam chay tay
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Lay ma nguon
        uses: actions/checkout@v4

      - name: Cai dat Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cai dat thu vien
        run: npm install

      - name: Build (Vite) - nap bien Supabase luc build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}

      - name: Chuan bi GitHub Pages
        uses: actions/configure-pages@v5

      - name: Tai ket qua build (thu muc dist) len Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Trien khai len GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
