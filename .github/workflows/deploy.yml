# Tự động build & đăng dashboard lên GitHub Pages.
# Đặt file này tại: .github/workflows/deploy.yml (ở GỐC repo).
# Yêu cầu: Settings → Pages → Build and deployment → Source = "GitHub Actions".
# Và thêm 2 Secret (Settings → Secrets and variables → Actions → New repository secret):
#   VITE_SUPABASE_URL       = https://<project>.supabase.co
#   VITE_SUPABASE_ANON_KEY  = <anon public key>

name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
